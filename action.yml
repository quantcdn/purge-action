name: "Purge content from QuantCDN"
description: "Purge content from QuantCDN by URL pattern or cache keys"
author: "QuantCDN"
inputs:
  customer:
    description: "Your customer account name"
    required: true
  project:
    description: "Your project name"
    required: true
  token:
    description: "Your API token"
    required: true
  url_pattern:
    description: "The URL path pattern to purge (mutually exclusive with cache_keys)"
    required: false
    default: ""
  cache_keys:
    description: "Space-separated cache keys to purge (mutually exclusive with url_pattern)"
    required: false
    default: ""
  soft_purge:
    description: "Mark content as stale rather than immediately deleting from edge caches"
    required: false
    default: "false"
  endpoint:
    description: "QuantCDN API endpoint"
    required: false
    default: "https://api.quantcdn.io/v1"
runs:
  using: "docker"
  image: "docker://quantcdn/cli:6.2.0"
  entrypoint: /bin/sh
  args:
    - -c
    - |
      set -e

      if [ -n "$INPUT_CACHE_KEYS" ] && [ -n "$INPUT_URL_PATTERN" ]; then
        echo "Error: cache_keys and url_pattern are mutually exclusive — pick one per step." >&2
        exit 1
      fi
      if [ -z "$INPUT_CACHE_KEYS" ] && [ -z "$INPUT_URL_PATTERN" ]; then
        echo "Error: provide either url_pattern or cache_keys." >&2
        exit 1
      fi

      set -- -c "$INPUT_CUSTOMER" -t "$INPUT_TOKEN" -p "$INPUT_PROJECT" --endpoint="$INPUT_ENDPOINT"
      if [ "$INPUT_SOFT_PURGE" = "true" ]; then
        set -- "$@" --soft-purge
      fi

      if [ -n "$INPUT_CACHE_KEYS" ]; then
        exec quant purge --cache-keys "$INPUT_CACHE_KEYS" "$@"
      else
        exec quant purge "$INPUT_URL_PATTERN" "$@"
      fi
branding:
  icon: "upload-cloud"
  color: "blue"
